version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ignite-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ignite-techfest-2026

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ignite-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/ignite-techfest-2026
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      CLIENT_URL: ${CLIENT_URL}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
    volumes:
      - ./server/src:/app/src

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: ignite-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      VITE_CLERK_SIGN_IN_URL: /sign-in
      VITE_CLERK_SIGN_UP_URL: /sign-up
      VITE_CLERK_AFTER_SIGN_IN_URL: /dashboard
      VITE_CLERK_AFTER_SIGN_UP_URL: /complete-profile

volumes:
  mongo_data:
    driver: local
